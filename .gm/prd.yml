- id: numeric-stability-underflow-overflow
  title: Protect against numeric underflow/overflow in distance/entropy computations
  description: 'Distances can be tiny (near-zero when embeddings nearly identical), entropies can be huge (large member sets). Use stable numerics: log-space computations for entropy, clipped distances, dtype widening. Witness: no NaN or Inf in any computed quantity.'
  acceptance: test_numeric_stability runs on synthetic extreme cases (identical members, huge clusters); no NaN/Inf appear
  witness_type: test
  status: pending
- id: extremely-large-clusters-memory-safety
  title: Handle extremely large clusters (100k+ members) without memory explosions
  description: 'If one cluster captures 100k members, computing pairwise distances is infeasible (100k^2 matrix). Guard: (1) cap cluster size during fit (force splits if size > threshold), (2) use sampling for statistics (entropy, variance), (3) lazy member loading (load on demand, not all at once). Witness: store with 1M members fits in memory.'
  acceptance: fit() with max_cluster_size cap; statistics computed on sample; store(1M_facts) succeeds with <2GB RAM
  witness_type: code
  status: pending
- id: query-injection-and-adversarial-inputs
  title: Sanitize and validate query inputs to prevent injection attacks or adversarial embeddings
  description: 'User-provided queries could be adversarial: extremely long (memory attack), repeated special chars (embedding degeneration), or crafted to match unintended clusters. Guard: (1) enforce max query length (e.g., 10k chars), (2) validate embedding norm is not degenerate, (3) log suspicious patterns for analysis. This is security hygiene.'
  acceptance: query_validator rejects >10k chars + suspicious patterns; log_suspicious flags patterns; tests on adversarial inputs succeed
  witness_type: code
  status: pending
- id: consistency-checks-post-mutation
  title: Add comprehensive consistency checks after every store mutation (add/forget/merge)
  description: 'After mutations, verify invariants: (1) no orphaned nodes (unreachable from root), (2) tree structure is acyclic, (3) containment is transitive, (4) apertures are valid (within bounds), (5) members are consistent (assignments match nodes). Checks run in O(n) time and are gated by a debug flag. Witness: consistency_check() passes post-every-mutation.'
  acceptance: add_consistency_check() runs after mutations (debug flag controlled); tests show all invariants hold
  witness_type: test
  status: pending
- id: graceful-degradation-on-partial-failures
  title: Define graceful degradation strategy when parts of hierarchy are unavailable
  description: 'If a cluster node becomes unavailable (disk error, cache miss), queries should not crash but return partial results from available octaves. Define degradation tiers: (1) skip unavailable node (use parent), (2) skip octave (use coarser level), (3) skip retrieval (return empty with explanation). This is resilience.'
  acceptance: define_degradation_tiers(); try_with_fallback(query, tier) succeeds even with simulated node-unavailability
  witness_type: code
  status: pending
- id: concurrent-access-and-thread-safety
  title: Define and test thread-safety model for concurrent retrieval + incremental ingestion
  description: 'If multiple threads query while ingestion updates the store, race conditions could corrupt state. Define model: (1) reads use MVCC (multi-version concurrency control) against snapshotted store version, (2) writes queue up and apply atomically, (3) reads never block on writes. Test: concurrent reader+writer threads + verify no errors and monotonic progress.'
  acceptance: implement MVCC or equivalent; test_concurrent_readwrite with 16 readers + 4 writers shows no races (ThreadSanitizer clean)
  witness_type: test
  status: pending
- id: comprehensive-paper-insights-summary
  title: Synthesize all 40 PRD rows into one summary document mapping to paper concepts
  description: 'Create final synthesis: docs/paper-insights-summary.md. Organize rows by paper concept (information-bottleneck, hierarchical folding, energy efficiency, multi-scale reasoning, etc.). For each concept, list which rows implement it, which are deferred, which are blocked. Include estimates for implementation effort, precedence, and risk. This is the master roadmap.'
  acceptance: docs/paper-insights-summary.md exists with all concepts mapped + effort/precedence/risk; README links to it
  witness_type: design
  status: completed
  witness: docs/paper-insights-summary.md — master roadmap with 9 concept-to-PRD mappings, 5 implementation phases, risk/success metrics
