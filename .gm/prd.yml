- id: agent-intuition-guide-comprehensive
  title: Comprehensive AGENT INTUITION GUIDE (7-section synthesis)
  description: 'Master document synthesizing all agent-facing knowledge from papers and prior work: (1) Semiotic cone fundamentals (content/meaning/form, aperture=confidence, octaves=scales); (2) Implicit signals (tension=information loss, flow=routing quality, entropy=confidence, dispel=hygiene); (3) Energy/accuracy tradeoff (coarse vs fine octaves, priority levels, adaptive budgeting); (4) Decision trees (trust/feedback/refit logic); (5) Failure modes & recovery (outside_cone, boundary_ambiguous, over_compressed, decomposition_fail, octave_mismatch); (6) Multi-scale patterns (coarse-to-fine, hierarchical decomposition, adaptive depth, octave routing, recursive proof, cross-scale consensus); (7) Mental models (folding as compression, octave-dependent meaning, entropy=confidence, tension=health, hierarchy as navigation, flow as highways, learning loop as reinforcement, fail-soft design, structure over algorithms, time=maturity). Each section includes intuition, decision logic, code examples, and paper grounding.'
  acceptance: 1. docs/agent-intuition-guide.md created with all 7 sections; 2. 50+ pages total; 3. 2+ worked examples per decision tree; 4. all sections grounded to papers/PRD; 5. agent can navigate guide and find answers
  status: pending
- id: agent-service-endpoints-typing
  title: Type-safe agent service endpoints with structured returns
  description: 'All agent endpoints (/search, /recall, /context_pack, /navigate, /deep_search, /consolidate, /diagnose) return typed Pydantic models. SearchResult(hits: list[SearchHit], metrics, energy_used), DeepSearchResult, ConsolidateReport, etc. Agents need strong contracts for IDE completion and validation.'
  acceptance: 1. All 8 endpoints return @dataclass types; 2. SearchHit includes aperture/entropy/uncertainty fields; 3. pytest validates all returns; 4. agent IDE shows types; 5. no stringly-typed dicts remain
  status: pending
- id: agent-query-priority-routing
  title: Query priority levels route to different octave depths and post-processing
  description: QueryPriority enum (HIGH, MEDIUM, LOW) affects octave_depths, mmr, uncertainty_quantification, latency_budgets. HIGH=octave-64 only, <100ms. MEDIUM=octaves 64+256, ~200ms, 70% recall. LOW=full stack, ~500ms, 95% recall.
  acceptance: 1. QueryPriority enum in agent_api.py; 2. search(priority=...) routes accordingly; 3. latency SLAs met per priority; 4. energy tracked per priority; 5. agent selects priority per query
  status: pending
- id: agent-confidence-signals-api
  title: Expose confidence signals to agents (aperture, entropy, divergence, uncertainty)
  description: 'SearchHit includes aperture, entropy_local, entropy_divergence, uncertainty_score, evidence_path_count, credibility. API: GET /confidence-signals returns per-result breakdown. Agents threshold on confidence, escalate low-confidence to human.'
  acceptance: 1. SearchHit carries 6 signal fields; 2. /confidence-signals endpoint returns all; 3. agent thresholds on any signal; 4. escalation triggered on low signals; 5. test shows signals correlate with actual quality
  status: pending
- id: agent-escalation-framework
  title: Structured escalation-to-human decision tree and prompts
  description: 'escalation_decision(result, query, context) returns (escalate, prompt, alternatives). Escalate if: uncertainty>0.7, entropy_divergence>0.2, dispel_count>5, query contains unknowns. Returns human-friendly prompt and alternatives.'
  acceptance: 1. escalation_decision() logic implemented; 2. 5+ escalation conditions; 3. prompts human-readable; 4. alternatives always provided; 5. agent uses output directly
  status: pending
- id: agent-failure-diagnosis-taxonomy
  title: Automatic failure mode detection and recovery suggestions
  description: 'diagnose(query, results) returns FailureMode enum + recovery_suggestions list. Detects: outside_cone, boundary_ambiguous, over_compressed, decomposition_fail, octave_mismatch. Each has 3-5 recovery strategies in priority order.'
  acceptance: 1. FailureMode enum covers 5+ modes; 2. diagnose() detects failures; 3. 3-5 recovery strategies per mode; 4. agent follows suggestions mechanically; 5. success tracked in learning loop
  status: pending
- id: agent-octave-routing-learning
  title: Learn and apply query-concept -> octave affinity over time
  description: Track which octaves work best for query concepts. After 50+ queries, compute octave_affinity[(concept, octave)] = success_rate. Prioritize high-affinity octaves in future searches. Agents benefit from system learning without tuning.
  acceptance: 1. octave_affinity matrix in learning_loop; 2. 50+ query threshold; 3. routing uses affinity; 4. agent inspects matrix; 5. affinity improves with queries
  status: pending
- id: agent-hierarchical-decomposition-api
  title: Decompose queries hierarchically along octave levels
  description: 'kb.decompose_by_octaves(query) returns dict[octave: list[sub_query]]. Uses hierarchy structure to partition search space. Coarse level identifies alternatives; fine levels drill each alternative.'
  acceptance: 1. decompose_by_octaves() returns octave->sub_queries; 2. test on 10+ query types; 3. coarse-level alternatives accurate; 4. fine-level drilling recovers details; 5. agent uses for query planning
  status: pending
- id: agent-multi-scale-consensus
  title: Cross-octave consensus ranking favors multiply-evidenced results
  description: Results appearing in 3+ octave levels are multiply-evidenced. consensus_rank(results) prioritizes by evidence_path_count. SearchHit.evidence_path_count shows retrieval octaves.
  acceptance: 1. evidence_path_count tracked per hit; 2. consensus_rank() sorts by count; 3. test on real KBs; 4. high-evidence results validate; 5. agent trusts evidence_path>=3
  status: pending
- id: agent-proof-by-hierarchy
  title: Verify answers by walking containment chain from leaf to root
  description: prove_by_containment_chain(fact) walks from leaf to root, checking contains(parent, fact)>0 at each step. Returns chain with margins. Detects containment violations.
  acceptance: 1. prove_by_containment_chain() implemented; 2. returns full path + margins; 3. detects violations; 4. test on healthy/corrupted trees; 5. agent uses for safety-critical work
  status: pending
- id: agent-energy-budget-tracking
  title: Track and expose per-query energy cost; implement early-exit on budget
  description: 'search() returns energy_used (milliseconds). Track over time: {query_type: energy_median}. Implement early-exit: if low-priority and energy_used > budget, return partial results.'
  acceptance: 1. energy_used in SearchResult; 2. energy tracked by query_type; 3. early-exit implemented; 4. agent sets energy_budget; 5. partial results preserve recall-loss info
