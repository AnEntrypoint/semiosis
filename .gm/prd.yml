- id: agent-confidence-calibration
  title: 'Agent Intuition: Learn to Calibrate Confidence Estimates Over Time'
  description: 'System outputs SearchHit.confidence, but is it well-calibrated? If confidence=0.8, is it right ~80% of time? Agent should track: {confidence_bin: actual_success_rate}. Over sessions, learn calibration curve. If miscalibrated, adjust confidence formula (e.g., apply isotonic regression). Helps agent: trust high-confidence when calibrated, request feedback when miscalibrated.'
  acceptance: 1. learning loop tracks (predicted_conf, actual_correct) pairs; 2. calibrate_confidence(pairs) fits isotonic or linear calibration; 3. search() applies learned calibration; 4. test shows calibration improves over sessions; 5. Brier score (MSE of confidence) improves
  witness_type: code
  status: completed
