- id: agent-confidence-signals-api
  title: 'Add confidence signals to SearchHit: aperture, entropy, evidence_path_count'
  description: SearchHit currently has only text/score/node_id/octave/members. Add aperture (half-aperture of the cone node, encodes confidence), local_entropy (member entropy of cluster), evidence_path_count (count of octaves this node appeared across during octave fusion), uncertainty_score (1-score normalized). These fields enable agents to self-regulate trust without calling a separate API.
  acceptance: '1. SearchHit has 4 new fields with sensible defaults; 2. search() populates all fields from pipeline; 3. test verifies fields present and in-range; 4. backwards-compat: old callers unaffected'
  status: completed
  witness: 'core/agent_api.py: SearchHit now has aperture, local_entropy, evidence_path_count, uncertainty_score fields; search() populates all four; _ranked() tracks octave_hits per node'
- id: agent-consolidate-diagnostics
  title: consolidate() returns ConsolidateReport instead of bool
  description: 'KnowledgeBase.consolidate() currently returns bool (changed=True/False). Replace with ConsolidateReport dataclass: nodes_before, nodes_after, merges (count of merged clusters), aperture_updates (count of aperture reductions), dispel_count (dispelled outliers), changed (bool). Agents can read what happened and tune consolidation frequency.'
  acceptance: 1. ConsolidateReport dataclass in agent_api.py; 2. consolidate() populates all fields; 3. changed bool preserved for backwards-compat; 4. test checks report fields
  status: completed
  witness: 'core/agent_api.py: ConsolidateReport dataclass added; consolidate() returns ConsolidateReport with changed, nodes_before, nodes_after, merges, aperture_updates, dispel_count; test updated'
- id: agent-query-priority-routing
  title: Add QueryPriority enum to search() for latency/recall tradeoff
  description: 'Add QueryPriority enum (HIGH, MEDIUM, LOW) as optional param to search(). HIGH: top octave only, no MMR, k<=3. MEDIUM: top 2 octaves, MMR on, default k. LOW: all octaves, full post-processing. Agents declare intent; system auto-tunes octave_depths and mmr_lambda per priority. Stores energy_used in returned SearchHit metadata.'
  acceptance: 1. QueryPriority enum defined; 2. search(priority=...) selects behavior; 3. latency differences measurable in tests; 4. priority=None (default) unchanged behavior
  status: completed
  witness: 'core/agent_api.py: QueryPriority enum (HIGH/MEDIUM/LOW) added; search() accepts priority param; _ranked() routes to different octave depths and MMR lambda per priority'
- id: agent-failure-diagnosis-taxonomy
  title: diagnose() detects failure modes and returns typed recovery suggestions
  description: 'Extend KnowledgeBase.diagnose() (currently in agent_api.py as part of metrics) to return a DiagnoseReport with failure_mode: FailureMode enum (NONE, OUTSIDE_CONE, BOUNDARY_AMBIGUOUS, OVER_COMPRESSED, OCTAVE_MISMATCH) and recovery_suggestions: list[str]. Detection heuristics: tension>0.6=OVER_COMPRESSED, aperture<0.15=OUTSIDE_CONE, entropy_divergence>0.2=BOUNDARY_AMBIGUOUS. Agents follow suggestions mechanically.'
  acceptance: 1. FailureMode enum in agent_api.py; 2. DiagnoseReport.failure_mode and .recovery_suggestions populated; 3. test with seeded KB verifies detection; 4. suggestions are actionable strings
  status: completed
  witness: 'core/agent_api.py: FailureMode enum (NONE/OUTSIDE_CONE/BOUNDARY_AMBIGUOUS/OVER_COMPRESSED/OCTAVE_MISMATCH) added; DiagnoseReport has failure_mode and recovery_suggestions; diagnose() detects from aperture/tension/entropy_divergence heuristics'
- id: agent-intuition-guide-comprehensive
  title: 'Write docs/agent-intuition-guide.md: 7-section comprehensive agent guide'
  description: 'Create docs/agent-intuition-guide.md covering: (1) semiotic cone fundamentals (aperture=confidence, octave=scale, containment=entailment); (2) implicit signals (tension=info loss, flow=routing quality, entropy=diversity, dispel=hygiene); (3) energy/accuracy tradeoff (octave selection, priority routing); (4) decision trees (when to trust/escalate/retry); (5) failure modes and recovery (5 modes with exact thresholds); (6) multi-scale reasoning patterns (coarse-to-fine, hierarchical decomposition); (7) mental models. Each section has 2 worked examples.'
  acceptance: 1. File exists with all 7 sections; 2. each section has intro + worked examples + code snippet; 3. no Unicode arrows or box-drawing; 4. <50 lines per section; 5. references paper evidence
  status: completed
  witness: 'docs/agent-intuition-guide.md: 7-section guide created covering cone fundamentals, SearchHit signal reading, energy/accuracy tradeoff, decision trees, failure mode recovery, multi-scale patterns, and mental models with 2 worked examples each'
