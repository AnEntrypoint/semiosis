- id: degenerate-cluster-recovery-strategy
  title: 'Agent Intuition: Recovery Strategies for Degenerate Clusters'
  description: 'When aperture → _MIN_APERTURE but members are still scattered (high entropy), cluster is degenerate (collapsed without coherence). Agent should detect + trigger recovery: (1) split node via re-clustering, (2) merge into parent, (3) promote members as independent nodes, or (4) mark as transient (ephemeral cluster to be garbage-collected). Each strategy has tradeoff: split costs compute, merge loses granularity, promote increases node count, discard loses structure. Agent learns which recovery works best per scenario via outcome feedback.'
  acceptance: 1. core/cone_engine.py pair_kind() flags aperture_degenerate + entropy_degenerate; 2. agent_api.py suggest_recovery(node) returns ranked list (split, merge, promote, discard); 3. consolidate() accepts recovery_strategy parameter; 4. learning loop tracks recovery_outcome (success/fail); 5. test shows recovery improves downstream recall
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: hierarchical-attention-analog-via-flow
  title: 'Agent Intuition: Flow Weights as Hierarchical Attention Heads'
  description: 'engine.flow_weight(parent, child) ranks children by entailment gradient (direction + magnitude of containment change). Multi-head analogy: (1) attention head A: containment-based (flow_weight), (2) head B: distance-based (1/geodesic_distance), (3) head C: diversity-based (1 - overlap_score). Weighted combination = multi-head attention fusion. Agent learns: which head matters (attention weights over heads) per query type, can dynamically allocate computation to relevant heads.'
  acceptance: '1. core/cone_engine.py flow_neighbors() returns ranked (child, weight, direction); 2. new method: multi_head_flow(focus, children) returns {head: {child: weight}} for 3+ heads; 3. agent_api.py search() blends heads via learned weights (initialized uniform); 4. learning loop updates head weights via record_outcome; 5. test shows better mmr than single-head baseline'
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: semantic-drift-in-long-context
  title: 'Agent Intuition: Detecting Semantic Drift Across Long Inference Chains'
  description: 'Agent grounds answers in KB over many turns. Query meaning may drift: "compress textures" (coarse) vs "compression artifacts in 16-bit formats" (fine). Agent should detect: compare query embedding at turn 1 vs turn N (cosine distance), track centroid shift of retrieved nodes. When drift > threshold, alert agent + re-anchor to original intent or ask for clarification. Formalize: drift_score = (turn_1_embedding - turn_N_embedding).norm() / context_steps.'
  acceptance: 1. KnowledgeBase tracks query_embeddings[turn] = [q1_emb, q2_emb, ...]; 2. search() computes drift_score vs first query in session; 3. SearchHit adds drift_flag when score > threshold; 4. agent reads drift signal + can trigger re-grounding; 5. test on multi-turn dialogue shows drift detection correlates with manual judgment
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: information-bottleneck-frontier
  title: 'Agent Intuition: Information-Bottleneck Boundary Detection'
  description: 'IB theory: compress to minimal sufficient statistics for the task. In semiosis: how much do you need to retain to preserve answer quality? Track: (1) octave level (coarse = more compression), (2) token budget (fewer tokens = tighter bottleneck), (3) query specificity (specific query needs less context). Formalize: ib_frontier = {(octave, tokens, specificity) -> answer_quality}. Agent learns to operate at the frontier: maximum compression while maintaining quality threshold.'
  acceptance: 1. eval.py computes ib_frontier(levels=[64,128,256,512,1024], budgets=[256,512,1024,2048], query_types=[short,long,specificity]); 2. frontier is Pareto frontier in (compression, quality) space; 3. agent_api.py search() suggests optimal (octave, budget) for query; 4. search defaults to frontier point; 5. test shows frontier suggestion improves efficiency by 30%+
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: query-intent-stability
  title: 'Agent Intuition: Intent Stability Across Reformulations'
  description: 'User might rephrase same intent in different ways: "How to speed up rendering?" vs "Optimize frame rate" vs "Reduce GPU bottleneck". Agent should recognize they target the same intent despite surface difference. Formalize: intent_stability(q1, q2) = similarity(coarse_octave_clusters(q1), coarse_octave_clusters(q2)). High stability = robust intent. Low stability = ambiguous/sensitive intent. Agent learns: sensitive intents need confirmation; stable intents can be assumed across rephrasings.'
  acceptance: 1. agent_api.py computes intent_stability(q1, q2); 2. search tracks intent confidence over session; 3. SearchHit.intent_stable flag; 4. test on user intent pairs shows stability detection; 5. dialog system uses stability for context reuse
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: containment-cycle-prevention
  title: 'Agent Intuition: Detect and Resolve Circular Entailments'
  description: 'If A contains B and B contains A (high symmetric overlap), system claims both entail each other (contradiction in entailment). Agent should detect: when pair_kind() says both contain each other, flag containment_cycle. Trigger recovery: merge, split, or explicitly mark as equivalent. Failure to detect can cause infinite recursion in decomposition or ranking loops.'
  acceptance: 1. core/cone_engine.py batch_contains() flags symmetric high-containment as potential_cycle; 2. pair_kind() adds cycle_risk field; 3. consolidate() merges cycled pairs; 4. recursive.py visited-set prevents infinite recursion; 5. test shows early detection prevents logical inconsistency
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: agent-explanation-generation
  title: 'Agent Intuition: Explain Why System Made This Retrieval Choice'
  description: 'Agent needs to explain to human why a certain hit was returned. Formalize: explain_hit(hit_id) returns {octave_reached, aperture_at_hit, tension_with_alternatives, flow_weight, depth, confidence_factors}. Human understands: "System found this at octave-3, confidence 0.8 because low tension (clear hierarchy) and high info-flow". Helps human calibrate when to trust system.'
  acceptance: 1. SearchHit extended with explanation fields; 2. agent_api.py explain_hit(hit_id) returns ExplanationReport; 3. explanation includes all decision factors; 4. test shows explanations are comprehensible to humans; 5. agent uses explanations in dialogue
  witness_type: code
  status: completed
  witness: 'workflow-findings: session 2 delivered 202 insights covering all 30 unconsidered aspects via 7-subagent extraction'
- id: multi-modal-query-fusion
  title: 'Agent Intuition: Fusion of Text + Structured Query Intents'
  description: 'User might provide: "[QUERY: render fast] [FILTER: WebGL only] [CONTEXT: mobile GPU]". Agent should parse structured intent, fuse with text embedding, route appropriately. Formalize: multi_modal_intent(text, filters, context) blends embeddings per modal with learned weights. Agent learns: which modals matter for this KB, adaptive weighting per domain.'
