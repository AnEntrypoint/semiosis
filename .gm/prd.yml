- id: lorentz-geodesic-distance
  title: 'Lorentz geodesic distance: project to hyperboloid and use arccosh formula'
  body: 'In semantic_distance(), add use_hyperbolic=True path: lift unit vector v to Lorentz sheet as x = (sqrt(1+||v||^2), v), compute arccosh(-<x_a, x_b>_L) where <.,.>_L is Minkowski inner product. This is the true hyperbolic geodesic matching the manifold used in cone_engine.py. Compare to cosine distance at same octave and report ratio as hyperbolic_gain signal.'
  priority: P2
  blockedBy: semantic-distance-ops
  status: completed
  witness: 'core/agent_api.py:606: arccosh(max(2-dot, 1.0)) formula; use_hyperbolic=True path; NaN bug fixed'
