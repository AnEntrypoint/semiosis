- id: agent-entropy-driven-ranking
  title: Rerank results by entropy profile to match agent's diversity preferences
  description: 'kb.search(..., diversity=HIGH) returns diverse results. diversity=MEDIUM: balanced. diversity=LOW: coherent, low-entropy. Agents declare intent, get automatic reranking.'
  acceptance: 1. diversity param in search(); 2. reranking by entropy implemented; 3. test shows diversity met; 4. agent tunes diversity per query; 5. recall maintained
