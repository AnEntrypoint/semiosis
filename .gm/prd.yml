- id: angle-at-near-zero-guard
  title: '_angle_at: guard ip*ip-1 near-zero'
  description: In _angle_at, den includes sqrt(clamp(ip*ip-1, min=EPS)). When ip is close to +/-1 (points nearly antipodal or coincident on the hyperboloid), ip*ip-1 approaches 0 from below before the clamp kicks in. The clamp rescues the sqrt but produces an arbitrary den magnitude near EPS, making arccos(num/den) unreliable. Needs a degenerate-input path or a numerically stable reformulation.
  priority: high
  status: completed
  witness: core/cone_engine.py:_angle_at -- ip = torch.clamp(ip, max=-(1.0+_EPS)) ensures ip*ip-1 >= _EPS^2 > 0, removing degenerate sqrt(0) path; secondary den clamp to _EPS retained
