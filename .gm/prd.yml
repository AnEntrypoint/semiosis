- id: semantic-direction-vector
  title: 'SemanticDirection: direction vector between concept pairs in Matryoshka subspace'
  body: Add SemanticDirection dataclass (from_node, to_node, octave, direction_vec, magnitude, cosine_alignment) and compute_direction(node_a, node_b, octave) in agent_api.py. Direction vec = centroid_b - centroid_a normalized in the target octave subspace. This is the primitive for 'what does concept B mean relative to A'.
  priority: P0
  blockedBy: ''
  status: completed
  witness: 'core/agent_api.py: SemanticDirection dataclass + compute_direction() added; all 26 tests pass'
- id: semantic-trajectory-path
  title: 'SemanticTrajectory: path through cone nodes from query to answer across octaves'
  body: 'Add SemanticTrajectory dataclass (steps: list[TrajectoryStep], total_distance, coherence_score) where each step is (node_id, octave, direction_from_prev, distance). compute_trajectory(query, answer_node) traces the octave-descent path taken by deep_search and wraps it as a navigable trajectory object.'
  priority: P0
  blockedBy: semantic-direction-vector
  status: completed
  witness: 'core/agent_api.py: compute_trajectory(query, answer_node_id) -> SemanticTrajectory; test_compute_trajectory_returns_trajectory passes'
- id: semantic-distance-ops
  title: 'semantic_distance(): hyperbolic geodesic + cosine at arbitrary octave'
  body: 'Add semantic_distance(text_a, text_b, octave=None) to KnowledgeBase. If octave given: encode both, slice to octave prefix, return 1-cosine. If octave=None: return dict of distances per octave (all Matryoshka prefixes). Hyperbolic geodesic option: project to Lorentz sheet and use arccosh formula. Agent can choose dimensionality freely.'
  priority: P0
  blockedBy: ''
  status: completed
  witness: 'core/agent_api.py: semantic_distance(octave, use_hyperbolic) implemented; arccosh domain fixed; test_semantic_distance_* pass'
- id: categoric-parent-summarizer
  title: 'CategorizationSummarizer: LLM generates opinionated summaries for cone node categories'
  body: Add CategorizationSummarizer class in core/summarizer.py. Takes a ConeNode + its member texts, calls an LLM (via configurable endpoint or stub) to produce a dense opinionated 1-sentence summary of the category. The summary is then embedded and stored as the node's centroid override (digest field on ConeNode). This grounds parent-direction vectors in semantic meaning rather than raw centroid.
  priority: P0
  blockedBy: ''
  status: completed
  witness: 'core/summarizer.py: CategorizationSummarizer(endpoint, model, api_key) with LLM call + fallback; test_categorization_summarizer_stub_no_key passes'
- id: agentic-inference-loop
  title: 'Agentic inference loop: low-confidence retrieval triggers LLM re-consideration'
  body: 'In KnowledgeBase.search(): when top hit has uncertainty_score > 0.5, offer search_with_reflection(query, k) that (a) calls LLM with: ''Consider this query carefully and rephrase it to highlight its most salient concept: {query}'', (b) re-embeds the rephrased query, (c) retries search with refined embedding, (d) returns both hit sets with provenance tag (original vs reflected). Agent can call tool again with the reflection hint.'
  priority: P1
  blockedBy: semantic-direction-vector
  status: completed
  witness: 'core/agent_api.py: search_with_reflection(query, reflect_fn) added; test_search_with_reflection_low_confidence passes'
- id: direction-analog-search
  title: 'direction_search(): find concepts in a given semantic direction from anchor'
  body: Add direction_search(anchor_text, direction_vec, k=5, octave=None) to KnowledgeBase. Encodes anchor, computes anchor_vec + alpha*direction_vec for alpha in [0.1, 0.5, 1.0, 2.0], searches at each alpha, unions and re-ranks by alignment with direction. Enables 'what is more X than Y' queries. Returns DirectionSearchResult with hits tagged by alpha.
  priority: P1
  blockedBy: semantic-direction-vector
  status: completed
  witness: 'core/agent_api.py: direction_search(anchor, direction_vec, k, octave) -> list[DirectionSearchResult]; test passes'
- id: octave-resolution-selector
  title: 'Auto octave resolution: choose best dimensionality for a given query pair'
  body: Add best_octave(text_a, text_b) to KnowledgeBase. Computes cosine distance between text_a and text_b at every octave prefix. Returns the octave where the distance signal is sharpest (max second derivative of distance vs log(dim)). This lets agents select dimensionality automatically rather than guessing.
  priority: P1
  blockedBy: semantic-distance-ops
  status: completed
  witness: 'core/agent_api.py: best_octave(text_a, text_b) via second derivative of distance vs log(dim); test_best_octave_returns_valid_prefix passes'
- id: hierarchy-folding-direction
  title: 'Fold hierarchy: derive category-to-subcategory direction vectors for intuition'
  body: 'Add fold_directions(node_id) to KnowledgeBase: for a given cone node, compute direction vectors to each child node centroid, return list of (child_id, direction_vec, semantic_label). semantic_label derived from CategorizationSummarizer if available, else child node text. This builds the ''downward intuition'' map: from a concept, what directions lead to its sub-concepts.'
  priority: P1
  blockedBy: categoric-parent-summarizer,semantic-direction-vector
  status: completed
  witness: 'core/agent_api.py: fold_directions(node_id, octave) -> list[dict] with semantic_label from summarizer; test_fold_directions_nonempty passes'
- id: energy-entropy-trajectory-score
  title: 'Trajectory coherence: energy-entropy score along semantic path'
  body: In SemanticTrajectory, add coherence_score = 1 - entropy(step_distances) / log(len(steps)+1). Low coherence = meandering path, high = direct conceptual route. Also add energy_cost = sum(step.distance * 2**step.octave_level) weighting deeper octave hops as more expensive. Agents use this to prefer shorter, cheaper paths to answer.
  priority: P1
  blockedBy: semantic-trajectory-path
  status: completed
  witness: 'core/agent_api.py: SemanticTrajectory.coherence_score = 1 - sqrt(var)/mean / log(n+1); energy_cost = sum(dist * 2^i); 30 tests pass'
